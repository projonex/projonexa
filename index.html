<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary SEO (overridden per route by react-helmet-async) -->
    <title>Projonexa | Final Year Projects & Innovation Platform — India</title>
    <meta
      name="description"
      content="Projonexa — India's trusted platform for final year projects, AI/ML, startup MVPs, and research assistance. End-to-end development with documentation & viva prep. Maharashtra, India."
    />
    <meta name="author" content="Nisarga Lokhande" />
    <meta name="robots" content="index, follow" />

    <!-- Geographic SEO -->
    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="Maharashtra, India" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Canonical (default home; updated per route via Helmet) -->
    <link rel="canonical" href="https://projonexa.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
